name: Direct Installer Build

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Branch, tag albo commit do zbudowania
        required: true
        default: main
        type: string
      configuration:
        description: Konfiguracja builda
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug
      platform:
        description: Architektura instalatora
        required: true
        default: x64
        type: choice
        options:
          - x64

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.git_ref }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: 8.0.x

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress

      - name: Run automated tests
        shell: pwsh
        run: |
          dotnet test .\TyfloCentrum.Windows.sln -c Debug -p:Platform=x64 --nologo

      - name: Build direct installer EXE
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\windows\Build-DirectSetupExe.ps1 -Configuration ${{ inputs.configuration }} -Platform ${{ inputs.platform }}

      - name: Resolve direct installer artifacts
        id: direct
        shell: pwsh
        run: |
          $setupDir = Get-ChildItem "$env:GITHUB_WORKSPACE\artifacts\DirectSetup" -Directory |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $setupDir) {
            throw 'Nie znaleziono katalogu direct setup.'
          }

          $setupExe = Get-ChildItem $setupDir.FullName -Filter TyfloCentrumSetup_*.exe -File |
            Select-Object -First 1
          if (-not $setupExe) {
            throw 'Nie znaleziono glownego pliku instalatora EXE.'
          }

          "setup_dir=$($setupDir.FullName)" >> $env:GITHUB_OUTPUT
          "setup_path=$($setupExe.FullName)" >> $env:GITHUB_OUTPUT

      - name: Upload direct installer artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: direct-setup-${{ inputs.platform }}-${{ inputs.configuration }}
          path: ${{ steps.direct.outputs.setup_path }}
          if-no-files-found: error
