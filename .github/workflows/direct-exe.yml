name: Direct EXE Build

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Branch, tag albo commit do zbudowania
        required: true
        default: main
        type: string
      configuration:
        description: Konfiguracja publish
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug
      platform:
        description: Architektura direct EXE
        required: true
        default: x64
        type: choice
        options:
          - x64
          - ARM64

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Run automated tests
        shell: pwsh
        run: |
          dotnet test .\TyfloCentrum.Windows.sln -c Debug -p:Platform=x64 --nologo

      - name: Build direct setup EXE
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\windows\Build-DirectSetupExe.ps1 -Configuration ${{ inputs.configuration }} -Platform ${{ inputs.platform }}

      - name: Resolve direct setup artifacts
        id: direct
        shell: pwsh
        run: |
          $setupDir = Get-ChildItem "$env:GITHUB_WORKSPACE\artifacts\DirectSetup" -Directory |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $setupDir) {
            throw 'Nie znaleziono katalogu direct setup EXE.'
          }

          $setupExe = Get-ChildItem $setupDir.FullName -Filter TyfloCentrumSetup_*.exe -File |
            Select-Object -First 1
          if (-not $setupExe) {
            throw 'Nie znaleziono glownego pliku instalatora TyfloCentrumSetup_*.exe.'
          }

          $zipPath = Join-Path $setupDir.Parent.FullName ($setupDir.Name + '.zip')
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          Compress-Archive -Path (Join-Path $setupDir.FullName '*') -DestinationPath $zipPath -Force

          "setup_dir=$($setupDir.FullName)" >> $env:GITHUB_OUTPUT
          "setup_exe=$($setupExe.FullName)" >> $env:GITHUB_OUTPUT
          "zip_path=$zipPath" >> $env:GITHUB_OUTPUT

      - name: Upload direct EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: direct-exe-${{ inputs.platform }}-${{ inputs.configuration }}
          path: |
            ${{ steps.direct.outputs.setup_exe }}
            ${{ steps.direct.outputs.zip_path }}
            ${{ steps.direct.outputs.setup_dir }}
          if-no-files-found: error
