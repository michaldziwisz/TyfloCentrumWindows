name: Store Release Submission

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Branch, tag albo commit do zbudowania
        required: true
        default: main
        type: string
      platform:
        description: Architektura pakietu MSIX
        required: true
        default: x64
        type: choice
        options:
          - x64
          - ARM64
      rollout_percentage:
        description: Procent rolloutu pakietu (puste = pelne wydanie)
        required: false
        default: ""
        type: string

concurrency:
  group: microsoft-store-submission
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      STORE_PRODUCT_ID: ${{ vars.STORE_PRODUCT_ID }}
      AZURE_AD_TENANT_ID: ${{ secrets.AZURE_AD_TENANT_ID }}
      SELLER_ID: ${{ secrets.SELLER_ID }}
      AZURE_AD_APPLICATION_CLIENT_ID: ${{ secrets.AZURE_AD_APPLICATION_CLIENT_ID }}
      AZURE_AD_APPLICATION_SECRET: ${{ secrets.AZURE_AD_APPLICATION_SECRET }}
      ROLLOUT_PERCENTAGE: ${{ inputs.rollout_percentage }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.git_ref }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: 8.0.x

      - name: Validate Store configuration
        shell: pwsh
        run: |
          foreach ($required in @(
            'STORE_PRODUCT_ID',
            'AZURE_AD_TENANT_ID',
            'SELLER_ID',
            'AZURE_AD_APPLICATION_CLIENT_ID',
            'AZURE_AD_APPLICATION_SECRET'
          )) {
            if ([string]::IsNullOrWhiteSpace((Get-Item "env:$required").Value)) {
              throw "Brakuje konfiguracji GitHub Actions: $required"
            }
          }

          if (-not [string]::IsNullOrWhiteSpace($env:ROLLOUT_PERCENTAGE)) {
            $value = [int]$env:ROLLOUT_PERCENTAGE
            if ($value -lt 0 -or $value -gt 100) {
              throw 'rollout_percentage musi byc liczba od 0 do 100.'
            }
          }

      - name: Install Microsoft Store CLI
        uses: microsoft/microsoft-store-apppublisher@v1.1

      - name: Reconfigure Microsoft Store CLI
        shell: pwsh
        run: |
          msstore reconfigure `
            --tenantId $env:AZURE_AD_TENANT_ID `
            --sellerId $env:SELLER_ID `
            --clientId $env:AZURE_AD_APPLICATION_CLIENT_ID `
            --clientSecret $env:AZURE_AD_APPLICATION_SECRET

      - name: Build release MSIX
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\windows\Build-DevMsix.ps1 -Configuration Release -Platform ${{ inputs.platform }}

      - name: Resolve package artifacts
        id: artifacts
        shell: pwsh
        run: |
          $packageDir = Get-ChildItem "$env:GITHUB_WORKSPACE\artifacts\SignedAppPackages" -Directory |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $packageDir) {
            throw 'Nie znaleziono katalogu pakietu MSIX.'
          }

          $msix = Get-ChildItem $packageDir.FullName -Filter *.msix |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $msix) {
            throw 'Nie znaleziono pliku MSIX.'
          }

          $appxsym = Get-ChildItem $packageDir.FullName -Filter *.appxsym -ErrorAction SilentlyContinue |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          "package_dir=$($packageDir.FullName)" >> $env:GITHUB_OUTPUT
          "msix_path=$($msix.FullName)" >> $env:GITHUB_OUTPUT
          if ($appxsym) {
            "appxsym_path=$($appxsym.FullName)" >> $env:GITHUB_OUTPUT
          }

      - name: Create MSIX upload package
        id: upload
        shell: pwsh
        run: |
          $packageDir = "${{ steps.artifacts.outputs.package_dir }}"
          $msixFileName = Split-Path "${{ steps.artifacts.outputs.msix_path }}" -Leaf
          $msixuploadPath = Join-Path $packageDir (
            [System.IO.Path]::GetFileNameWithoutExtension($msixFileName) + '.msixupload'
          )

          $archiveEntries = @($msixFileName)
          if (-not [string]::IsNullOrWhiteSpace("${{ steps.artifacts.outputs.appxsym_path }}")) {
            $archiveEntries += Split-Path "${{ steps.artifacts.outputs.appxsym_path }}" -Leaf
          }

          Push-Location $packageDir
          try {
            Compress-Archive -Path $archiveEntries -DestinationPath $msixuploadPath -Force
          }
          finally {
            Pop-Location
          }

          "msixupload_path=$msixuploadPath" >> $env:GITHUB_OUTPUT

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: store-release-${{ inputs.platform }}
          path: |
            ${{ steps.upload.outputs.msixupload_path }}
            ${{ steps.artifacts.outputs.msix_path }}
            ${{ steps.artifacts.outputs.appxsym_path }}
          if-no-files-found: error

      - name: Publish submission to Microsoft Store
        shell: pwsh
        run: |
          # msstore publish oczekuje KATALOGU z paczka (-i/--inputDirectory),
          # nie sciezki do pliku, i sam wybiera kandydata .msix/.msixupload.
          # Katalog paczki zawiera tez .msix i .cer, wiec izolujemy .msixupload
          # w czystym katalogu, by CLI wzialo dokladnie ten plik.
          $uploadDir = Join-Path $env:RUNNER_TEMP 'store-upload'
          New-Item -ItemType Directory -Force -Path $uploadDir | Out-Null
          Copy-Item "${{ steps.upload.outputs.msixupload_path }}" -Destination $uploadDir -Force

          $arguments = @(
            'publish',
            "$env:GITHUB_WORKSPACE\src\TyfloCentrum.Windows.App",
            '--inputDirectory', $uploadDir,
            '-id', $env:STORE_PRODUCT_ID,
            '--noCommit'
          )

          # API devcenter bywa niestabilne (przejsciowe HTTP 504 na GET aplikacji),
          # a msstore nie ma wlasnego retry - trafienie w 504 wywala caly run z
          # mylacym "Could not retrieve your application". Ponawiamy sam publish
          # kilka razy w tym samym runie, bez ponownego budowania paczki.
          # Uwaga: publikujemy z --noCommit, bo listing (What's new/opis)
          # aktualizujemy PO wgraniu pakietu, a commit robimy dopiero na koncu.
          $maxAttempts = 6
          $published = $false
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            Write-Host "Publish - proba $attempt z $maxAttempts"
            & msstore @arguments
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Publish OK w probie $attempt."
              $published = $true
              break
            }
            if ($attempt -lt $maxAttempts) {
              Write-Host "Proba $attempt nieudana (exit $LASTEXITCODE). Czekam 60 s i ponawiam..."
              Start-Sleep -Seconds 60
            }
          }
          if (-not $published) {
            throw "Publish nie powiodl sie po $maxAttempts probach (prawdopodobnie niestabilne API devcenter, HTTP 504)."
          }

      - name: Update Store listing metadata (What's new / opis)
        shell: pwsh
        run: |
          # msstore publish wgrywa TYLKO pakiet i NIE rusza tekstow listingu.
          # Nadpisujemy listing (opis + What's new) trescia z repo
          # (store/listing/*.txt) przez Store REST API, z wlasnym retry na 504.
          python "$env:GITHUB_WORKSPACE\scripts\store\update_listing.py"

      - name: Commit submission to the Store
        shell: pwsh
        run: |
          # Dopiero teraz skladamy submisje do certyfikacji (pakiet + zaktualizowany
          # listing). msstore submission publish potrafi trafic w 504 - retry.
          $maxAttempts = 6
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            Write-Host "Commit submission - proba $attempt z $maxAttempts"
            msstore submission publish $env:STORE_PRODUCT_ID
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Commit OK w probie $attempt."
              exit 0
            }
            if ($attempt -lt $maxAttempts) {
              Write-Host "Proba $attempt nieudana (exit $LASTEXITCODE). Czekam 60 s i ponawiam..."
              Start-Sleep -Seconds 60
            }
          }
          throw "Commit submission nie powiodl sie po $maxAttempts probach (prawdopodobnie niestabilne API devcenter, HTTP 504)."

      - name: Poll submission status
        continue-on-error: true
        shell: pwsh
        run: |
          # Diagnostyka statusu - nie moze wywalac wydania (submisja juz zlozona).
          msstore submission poll $env:STORE_PRODUCT_ID
